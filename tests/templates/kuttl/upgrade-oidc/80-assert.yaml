---
# Log in via Keycloak again after the upgrade. The user record was created by
# Flask-AppBuilder during the pre-upgrade login (step 60), so this exercises
# the existing-user OAuth login path on the new Superset/FAB version. The
# script was already copied to the test pod in step 60.
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
metadata:
  name: login-after-upgrade
timeout: 300
commands:
  - script: kubectl exec -n $NAMESPACE python-0 -- python /stackable/60_login.py
