---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
metadata:
  name: install-superset
timeout: 300
commands:
  - script: kubectl -n $NAMESPACE wait --for=condition=available=true supersetclusters.superset.stackable.tech/superset --timeout 301s
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: superset-node-default
  generation: 1 # There should be no unneeded Pod restarts
  labels:
    restarter.stackable.tech/enabled: "true"
spec:
  template:
    spec:
      terminationGracePeriodSeconds: 120
status:
  readyReplicas: 1
  replicas: 1
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: superset-node
status:
  expectedPods: 1
  currentHealthy: 1
  disruptionsAllowed: 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: superset-worker-default
  generation: 1 # There should be no unneeded Pod restarts
  labels:
    restarter.stackable.tech/enabled: "true"
spec:
  template:
    spec:
      terminationGracePeriodSeconds: 120
status:
  readyReplicas: 1
  replicas: 1
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: superset-worker
status:
  expectedPods: 1
  currentHealthy: 1
  disruptionsAllowed: 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: superset-beat-default
  generation: 1 # There should be no unneeded Pod restarts
  labels:
    restarter.stackable.tech/enabled: "true"
spec:
  template:
    spec:
      terminationGracePeriodSeconds: 120
status:
  readyReplicas: 1
  replicas: 1
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: superset-beat
status:
  expectedPods: 1
  currentHealthy: 1
  disruptionsAllowed: 1
---
apiVersion: v1
kind: Service
metadata:
  name: superset-node-default-headless
  labels:
    app.kubernetes.io/component: node
spec:
  clusterIP: None
  ports:
    - name: http
      port: 8088
  selector:
    app.kubernetes.io/component: node
    app.kubernetes.io/instance: superset
    app.kubernetes.io/role-group: default
---
apiVersion: v1
kind: Service
metadata:
  name: superset-node-default-metrics
  labels:
    app.kubernetes.io/component: node
    prometheus.io/scrape: "true"
spec:
  clusterIP: None
  ports:
    - name: metrics
      port: 9102
  selector:
    app.kubernetes.io/component: node
    app.kubernetes.io/instance: superset
    app.kubernetes.io/role-group: default
---
apiVersion: v1
kind: Service
metadata:
  name: superset-worker-default-metrics
  labels:
    app.kubernetes.io/component: worker
    prometheus.io/scrape: "true"
spec:
  clusterIP: None
  ports:
    - name: metrics
      port: 9102
  selector:
    app.kubernetes.io/component: worker
    app.kubernetes.io/instance: superset
    app.kubernetes.io/role-group: default
---
apiVersion: v1
kind: Service
metadata:
  name: superset-beat-default-metrics
  labels:
    app.kubernetes.io/component: beat
    prometheus.io/scrape: "true"
spec:
  clusterIP: None
  ports:
    - name: metrics
      port: 9102
  selector:
    app.kubernetes.io/component: beat
    app.kubernetes.io/instance: superset
    app.kubernetes.io/role-group: default
