#
# To run these tests on OpenShift you have to ensure that:
# 1. The "openshift" dimension below is set to "true"
#
---
dimensions:
  - name: superset
    values:
      # - 4.1.4
      # - 6.0.0
      # Or use a custom image:
      - 6.0.0,oci.stackable.tech/sdp/superset:6.0.0-stackable0.0.0-dev
      - 6.1.0,oci.stackable.tech/sdp/superset:6.1.0-stackable0.0.0-dev
      # - 6.1.0,oci.stackable.tech/sandbox/superset:6.1.0
  - name: superset-latest
    values:
      # - 6.0.0
      - 6.1.0,oci.stackable.tech/sdp/superset:6.1.0-stackable0.0.0-dev
      # - 6.0.0,oci.stackable.tech/sandbox/superset:6.0.0
  - name: superset-old
    values:
      - 4.1.4,oci.stackable.tech/sdp/superset:4.1.4-stackable0.0.0-dev
      - 6.0.0,oci.stackable.tech/sdp/superset:6.0.0-stackable0.0.0-dev
  - name: superset-new
    values:
      - 6.1.0,oci.stackable.tech/sdp/superset:6.1.0-stackable0.0.0-dev
  - name: ldap-authentication
    values:
      - no-tls
      - insecure-tls
      - server-verification-tls
  # Authentication used in the upgrade test. "none" tests that seeded content
  # survives the metadata database migrations, "oidc" tests that the OAuth
  # login of an existing user still works after the upgrade.
  - name: authentication
    values:
      - none
      - oidc
  - name: opa-latest
    values:
      - 1.16.2
  - name: openshift
    values:
      - "false"
tests:
  - name: smoke
    dimensions:
      - superset
      - openshift
  - name: cluster-operation
    dimensions:
      - superset-latest
      - openshift
  - name: druid-connection
    dimensions:
      - superset
      - openshift
  - name: ldap
    dimensions:
      - superset
      - ldap-authentication
      - openshift
  - name: oidc
    dimensions:
      - superset
      - openshift
  - name: opa
    dimensions:
      - superset
      - opa-latest
      - openshift
  - name: resources
    dimensions:
      - superset-latest
      - openshift
  - name: logging
    dimensions:
      - superset
      - openshift
  - name: external-access
    dimensions:
      - superset
      - openshift
  - name: celery-worker
    dimensions:
      - superset
      - openshift
  - name: upgrade
    dimensions:
      - superset-old
      - superset-new
      - authentication
      - openshift
suites:
  - name: nightly
    patch:
      - dimensions:
          - name: superset
            expr: last
  - name: smoke-latest
    select:
      - smoke
    patch:
      - dimensions:
          - expr: last
  - name: openshift
    patch:
      - dimensions:
          - name: superset
            expr: last
          - name: openshift
            expr: "true"
